<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1b26;
      color: #c0caf5;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #7aa2f7;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label {
      font-size: 13px;
      color: #c0caf5;
    }
    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #2e3045;
      border-radius: 24px;
      transition: 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background: #7a82a6;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider {
      background: #7aa2f7;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
      background: #fff;
    }
    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #7a82a6;
    }
  </style>
</head>
<body>
  <h3>⚡ Friday Gmail Dark</h3>
  <div class="toggle-row">
    <span class="toggle-label">Dark mode</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
